---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Chart.Name }}-pgadmin"
  namespace: {{ .Release.Namespace }}
  labels:
    app: "{{ .Chart.Name }}-pgadmin"
    component: configmap
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "Homelab",
          "Group": "Servers",
          "Username": "admin",
          "Port": {{ .Values.pgadmin.database.port }},
          "Host": "{{ .Values.pgadmin.database.host }}",
          "SSLMode": "prefer",
          "MaintenanceDB": "postgres"
        }
      }
    }

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "{{ .Chart.Name }}-pgadmin"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: "{{ .Chart.Name }}-pgadmin"
    component: externalsecret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: "jdp-backend-secrets"
    kind: ClusterSecretStore
  target:
    name: "{{ .Chart.Name }}-pgadmin"
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: pgadmin

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Chart.Name }}-pgadmin"
  namespace: {{ .Release.Namespace }}
  labels: &labels
    app: "{{ .Chart.Name }}-pgadmin"
    component: deployment
spec:
  replicas: 1
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      containers:
        - name: pgadmin
          image: {{ .Values.pgadmin.image }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: "{{ .Chart.Name }}-pgadmin"
                  key: admin-email
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Chart.Name }}-pgadmin"
                  key: admin-password
          # resources:
          #   requests:
          #     memory: 16Mi
          #   limits:
          #     memory: 32Mi
          volumeMounts:
          - name: "config"
            mountPath: /pgadmin4/servers.json
            subPath: servers.json
            readOnly: true
          - name: "data"
            mountPath: /var/lib/pgadmin
      volumes:
      - name: "config"
        configMap:
          name: "{{ .Chart.Name }}-pgadmin"
      - name: "data"
        emptyDir:
          sizeLimit: 10Mi

---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Chart.Name }}-pgadmin"
  namespace: {{ .Release.Namespace }}
  labels:
    app: "{{ .Chart.Name }}-pgadmin"
    component: service
spec:
  selector:
    app: "{{ .Chart.Name }}-pgadmin"
    component: deployment
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: "{{ .Chart.Name }}-pgadmin"
  namespace: {{ .Release.Namespace }}
  labels:
    app: "{{ .Chart.Name }}-pgadmin"
    component: ingress
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`{{ .Values.pgadmin.hostname }}`)
      services:
        - kind: Service
          name: "{{ .Chart.Name }}-pgadmin"
          port: 80
